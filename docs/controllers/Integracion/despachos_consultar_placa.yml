/api/v1/integracion/despachos/placa/{placa}:
  get:
    tags:
      - Integración Despachos
    summary: Consultar despacho por placa
    description: |
      Puente hacia el servicio externo `GET /despachos/placa/{placa}`.
      No persiste información en la base de datos local.
    security:
      - bearerAuth: []
    parameters:
      - in: path
        name: placa
        required: true
        schema:
          type: string
        description: Placa del vehículo (se normaliza a mayúsculas sin espacios ni guiones).
      - in: query
        name: fechaSalida
        required: false
        schema:
          type: string
          format: date
        description: Fecha de salida en formato YYYY-MM-DD.
    responses:
      '200':
        description: Despacho encontrado en el servicio externo.
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      '400':
        description: Petición inválida o token de autorización no encontrado.
        content:
          application/json:
            schema:
              type: object
              required:
                - mensaje
              properties:
                mensaje:
                  type: string
      '401':
        description: Sesión expirada.
        content:
          application/json:
            schema:
              type: object
              required:
                - mensaje
              properties:
                mensaje:
                  type: string
      '404':
        description: Despacho no encontrado para la placa indicada.
        content:
          application/json:
            schema:
              type: object
              required:
                - mensaje
              properties:
                mensaje:
                  type: string
      '500':
        description: Error interno o del servicio externo.
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
