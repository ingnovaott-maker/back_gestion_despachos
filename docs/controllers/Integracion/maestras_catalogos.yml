/api/v1/integracion/maestras/nivel-servicio:
  get:
    tags:
      - Integración Maestras
    summary: Listar niveles de servicio
    description: |
      Puente hacia `GET /nivelservicio` del servicio de despachos externo.
      No persiste información en la base de datos local.
    security:
      - bearerAuth: []
    parameters:
      - in: query
        name: page
        required: false
        schema:
          type: integer
          minimum: 1
        description: Número de página.
      - in: query
        name: numero_items
        required: false
        schema:
          type: integer
          minimum: 1
        description: Cantidad de registros por página.
    responses:
      '200':
        description: Catálogo de niveles de servicio.
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      '401':
        description: Sesión expirada.
        content:
          application/json:
            schema:
              type: object
              required:
                - mensaje
              properties:
                mensaje:
                  type: string
      '500':
        description: Error al consultar el servicio externo.
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true

