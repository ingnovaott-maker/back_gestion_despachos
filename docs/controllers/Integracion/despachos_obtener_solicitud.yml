/api/v1/integracion/despachos/solicitud/{id}:
  get:
    tags:
      - Integración Despachos
    summary: Obtener solicitud de despacho
    description: Consulta una solicitud de despacho previamente guardada en la base de datos local.
    security:
      - bearerAuth: []
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
          minimum: 1
        description: Identificador local de la solicitud (`des_sol_id`).
    responses:
      '200':
        description: Solicitud de despacho encontrada.
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: integer
                payload:
                  type: object
                  additionalProperties: true
                  description: JSON completo enviado por el front.
                nitVigilado:
                  type: string
                usuarioId:
                  type: string
                fuenteDato:
                  type: string
                  example: WEB
                procesado:
                  type: boolean
                idDespachoExterno:
                  type: integer
                  nullable: true
                respuestaExterna:
                  type: object
                  nullable: true
                  additionalProperties: true
                errorExterno:
                  type: string
                  nullable: true
                fechaCreacion:
                  type: string
                  format: date-time
                fechaActualizacion:
                  type: string
                  format: date-time
      '401':
        description: Sesión expirada o autenticación incompleta.
        content:
          application/json:
            schema:
              type: object
              required:
                - mensaje
              properties:
                mensaje:
                  type: string
      '404':
        description: Solicitud no encontrada.
        content:
          application/json:
            schema:
              type: object
              required:
                - mensaje
              properties:
                mensaje:
                  type: string
      '500':
        description: Error interno al consultar la solicitud.
        content:
          application/json:
            schema:
              type: object
              required:
                - mensaje
              properties:
                mensaje:
                  type: string
